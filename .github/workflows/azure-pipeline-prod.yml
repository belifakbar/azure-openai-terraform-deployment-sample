name: Prod CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_WORKING_DIR: "infra"
  AZURE_RESOURCE_GROUP_PROD: "rg-prod-openai-app"
  AZURE_CONTAINER_REGISTRY_PROD: "acrprodopenai"
  AZURE_AKS_CLUSTER_PROD: "aks-prod-openai"
  AZURE_LOCATION: "East US"
  TFSTATE_RESOURCE_GROUP: "rg_azure_openai"
  TFSTATE_STORAGE_ACCOUNT: "stgazureopenai101"
  TFSTATE_CONTAINER: "terraformstateprod"
  TFSTATE_KEY_PROD: "BUhCfd45letMAd/AHLkvBWPvKmzMicO27UjKA/d8P5VvMkaRnHX8SN6f5MwMi/lCdrHNsjQruc92+AStVsZM2Q=="

jobs:
  terraform_plan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.x

    - name: Terraform Init
      run: terraform init
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Plan
      run: terraform plan -out=tfplan
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Upload Terraform Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: ${{ env.TF_WORKING_DIR }}/tfplan

    - name: Upload Terraform Lock File Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-lockfile
        path: ${{ env.TF_WORKING_DIR }}/.terraform.lock.hcl
        include-hidden-files: true

