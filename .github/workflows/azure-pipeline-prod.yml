name: Prod CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_WORKING_DIR: "infra"
  AZURE_RESOURCE_GROUP_PROD: "rg-prod-openai-app"
  AZURE_CONTAINER_REGISTRY_PROD: "acrprodopenai"
  AZURE_AKS_CLUSTER_PROD: "aks-prod-openai"
  AZURE_LOCATION: "East US"
  AZURE_CREDENTIALS_PROD: ${{ secrets.AZURE_CREDENTIALS_PROD }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  terraform_plan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.x

    - name: Terraform Init
      run: terraform init -reconfigure
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Plan
      run: terraform plan -out=tfplan
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Upload Terraform Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: ${{ env.TF_WORKING_DIR }}/tfplan

    - name: Upload Terraform Lock File Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-lockfile
        path: ${{ env.TF_WORKING_DIR }}/.terraform.lock.hcl
        include-hidden-files: true

  terraform_apply:
    runs-on: ubuntu-latest
    needs: terraform_plan

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Terraform Plan Artifact
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan
        path: ${{ env.TF_WORKING_DIR }}

    - name: Download Terraform Lock File Artifact
      uses: actions/download-artifact@v4
      with:
        name: terraform-lockfile
        path: ${{ env.TF_WORKING_DIR }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.x

    - name: Terraform Init (Apply Job)
      run: terraform init -lockfile=readonly
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Apply (Prod)
      run: terraform apply tfplan
      working-directory: ${{ env.TF_WORKING_DIR }}

  post_deploy:
    runs-on: ubuntu-latest
    needs: terraform_apply
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Download Terraform Lock File Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-lockfile
          path: ${{ env.TF_WORKING_DIR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Terraform Init (Read State)
        run: terraform init -lockfile=readonly
        working-directory: ${{ env.TF_WORKING_DIR }}

      # 🔥 Install kubectl
      - name: Install kubectl
        run: |
          az aks install-cli

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ env.AZURE_CREDENTIALS_PROD }}
      
      # 🔥 Run installation script from Terraform output
      - name: Run Deployment Script
        run: |
          terraform output -raw installation-script > install.sh
          chmod +x install.sh
          ./install.sh
        working-directory: ${{ env.TF_WORKING_DIR }}

      # 🔥 Get service external IP
      - name: Get Service External IP
        run: |
          kubectl get services -n chatbot